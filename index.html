<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PurePDF</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/pdf-lib"></script>
</head>
<body>
  <div class="container">
    <header class="top-bar">
      <h1 class="brand">PurePDF</h1>
      <div class="header-actions">
        <!-- Tombol Cara Menggunakan[cite: 1] -->
        <button id="helpBtn" class="btn-icon-text" title="Cara Menggunakan">
          <span class="material-icons">help_outline</span>
        </button>
        <!-- Tombol Dark Mode[cite: 1] -->
        <button id="themeToggle" class="btn-theme-toggle">
          <span class="material-icons" id="themeIcon">dark_mode</span>
        </button>
      </div>
    </header>

    <div class="hero-text">
      <h2>Manajemen PDF langsung di browser Anda.</h2>
      <p>Tanpa instalasi aplikasi, tanpa server, tanpa upload data. - 100% aman!</p>
    </div>

    <main>
      <!-- Upload Area tetap di atas[cite: 1] -->
      <section class="upload-area">
        <div class="dropzone" id="dropzone">
          <span class="material-icons" style="font-size: 48px; color: var(--border);">upload_file</span>
          <p>Seret file PDF ke sini atau klik untuk upload</p>
          <span class="sub-text">Privasi aman: File tidak dikirim ke server manapun.</span>
        </div>
        <ul id="fileList" class="file-list"></ul>
      </section>

      <section class="settings">
        <div class="input-group">
          <label for="fileName">Nama File Hasil:</label>
          <input type="text" id="fileName" placeholder="Pure_Output">
        </div>
      </section>

      <!-- Tombol Aksi Kotak Persegi dengan Ikon[cite: 1] -->
      <section class="action-buttons-grid">
        <button id="mergeBtn" class="btn-square">
          <span class="material-icons">picture_as_pdf</span>
          <span>Gabungkan PDF</span>
        </button>
        <button id="splitBtn" class="btn-square">
          <span class="material-icons">content_cut</span>
          <span>Pisahkan PDF</span>
        </button>
        <button id="compressBtn" class="btn-square">
          <span class="material-icons">compress</span>
          <span>Kompres PDF</span>
        </button>
      </section>

      <div id="progress" class="status-msg"></div>

      <!-- Preview Area disembunyikan secara default[cite: 1] -->
      <section id="previewArea" class="preview-area hidden">
        <h3>Preview Hasil</h3>
        <iframe id="preview"></iframe>
        <button id="downloadBtn" class="btn-success">Download Sekarang</button>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 - Gitakara Ardhytama</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
